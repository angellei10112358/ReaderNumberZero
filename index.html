<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永夜书馆·零号借阅者</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&display=swap');
body{
  background:#0a0a0f;
  color:#c8c0b0;
  font-family:'Noto Serif SC','SimSun',serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  background-image:radial-gradient(ellipse at top,#1a1520 0%,#0a0a0f 70%);
}
#container{
  max-width:760px;
  width:100%;
  min-height:90vh;
  position:relative;
}
#stats{
  display:flex;
  justify-content:space-between;
  padding:12px 18px;
  background:rgba(20,15,30,0.85);
  border:1px solid #3a2a3a;
  border-radius:4px;
  margin-bottom:18px;
  font-size:13px;
  letter-spacing:1px;
  backdrop-filter:blur(4px);
  flex-wrap:wrap;
  gap:4px;
}
#stats .stat{display:flex;align-items:center;gap:5px}
#stats .label{color:#6a5a6a}
#stats .value{color:#d4c8b0;font-weight:700}
.value.danger{color:#c0392b}
.value.warning{color:#d4a44a}
.value.safe{color:#7ab87a}
.value.chapter{color:#8a7aaa}
#story{
  background:rgba(16,12,22,0.9);
  border:1px solid #2a1a2a;
  border-radius:4px;
  padding:28px 24px;
  min-height:340px;
  line-height:1.9;
  font-size:16px;
  text-shadow:0 0 1px rgba(200,192,176,0.1);
}
#story p{margin-bottom:1em;text-indent:2em}
#story p.note{color:#7a6a6a;font-size:14px;border-left:2px solid #3a2a3a;padding-left:14px;text-indent:0;margin:16px 0}
#story p.highlight{color:#d4a44a;text-indent:0;padding:10px 16px;background:rgba(212,164,74,0.08);border:1px solid rgba(212,164,74,0.2);border-radius:3px}
#story p.danger{color:#c0392b;text-indent:0;padding:10px 16px;background:rgba(192,57,43,0.08);border:1px solid rgba(192,57,43,0.2);border-radius:3px}
#story p.system{color:#5a8a7a;font-size:14px;text-indent:0;font-style:italic}
#story p.glitch{color:#8a5aaa;text-indent:0;padding:12px 16px;background:rgba(138,90,170,0.08);border:1px solid rgba(138,90,170,0.25);border-radius:3px;font-family:'ZCOOL XiaoWei',serif;letter-spacing:1px}
#story p.thought{color:#8a7a6a;font-size:14px;text-indent:0;font-style:italic;border-right:2px solid #4a3a3a;padding-right:14px;text-align:right}
#story p.poem{color:#a89a7a;text-indent:0;padding:10px 18px;background:rgba(168,154,122,0.06);border-left:3px solid #7a6a5a;font-style:italic;line-height:2;margin:12px 0}
#story p.scene-title{color:#5a4a6a;text-indent:0;text-align:center;font-size:14px;letter-spacing:3px;margin:10px 0 18px 0;border-bottom:1px dashed #2a1a3a;padding-bottom:10px}
#choices{
  margin-top:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.choice-btn{
  background:rgba(30,25,40,0.9);
  border:1px solid #3a2a4a;
  color:#c8c0b0;
  padding:12px 18px;
  font-family:'Noto Serif SC',serif;
  font-size:15px;
  text-align:left;
  cursor:pointer;
  border-radius:3px;
  transition:all 0.2s;
  line-height:1.5;
}
.choice-btn:hover{
  background:rgba(50,40,70,0.9);
  border-color:#7a5a8a;
  color:#ede4d0;
  transform:translateX(4px);
}
.choice-btn .hint{
  display:block;
  font-size:12px;
  color:#6a5a6a;
  margin-top:2px;
}
.choice-btn.disabled{
  opacity:0.4;
  cursor:not-allowed;
  pointer-events:none;
}

#ability-bar{
  margin-top:12px;
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}
.ability-btn{
  background:rgba(40,30,50,0.9);
  border:1px solid #4a3a5a;
  color:#b8a8c8;
  padding:8px 14px;
  font-family:'Noto Serif SC',serif;
  font-size:13px;
  cursor:pointer;
  border-radius:3px;
  transition:all 0.2s;
}
.ability-btn:hover{
  background:rgba(60,45,80,0.9);
  border-color:#8a6aaa;
  color:#e0d0f0;
}
#power-status{
  margin-top:8px;
  padding:8px 14px;
  background:rgba(40,35,50,0.6);
  border:1px solid #2a2a3a;
  border-radius:3px;
  font-size:12px;
  color:#8a7a9a;
  min-height:18px;
  display:flex;
  flex-wrap:wrap;
  gap:6px;
}
#power-status .power-tag{
  display:inline-block;
  padding:2px 8px;
  background:rgba(90,70,120,0.2);
  border:1px solid #4a3a5a;
  border-radius:10px;
  font-size:11px;
  color:#b8a8c8;
}
.type-cursor::after{content:'▌';animation:blink 1s step-end infinite;color:#6a5a6a}
@keyframes blink{50%{opacity:0}}
.fade-in{animation:fadeIn 0.5s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.shake{animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.glitch-border{animation:glitchBorder 2s infinite}
@keyframes glitchBorder{0%,100%{border-color:#4a3a5a}10%{border-color:#8a5aaa}20%{border-color:#2a1a2a}30%{border-color:#aa5a8a}50%{border-color:#3a2a4a}70%{border-color:#6a4a8a}90%{border-color:#3a2a3a}}
#title-screen{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:70vh;
  text-align:center;
}
#title-screen h1{
  font-size:36px;
  font-weight:900;
  color:#d4c0b0;
  letter-spacing:6px;
  margin-bottom:8px;
  text-shadow:0 0 20px rgba(180,140,120,0.2);
}
#title-screen .sub{
  font-size:16px;
  color:#6a5a6a;
  letter-spacing:8px;
  margin-bottom:40px;
}
#title-screen .start-btn{
  background:transparent;
  border:1px solid #4a3a4a;
  color:#b8a8a0;
  padding:14px 48px;
  font-family:'Noto Serif SC',serif;
  font-size:18px;
  cursor:pointer;
  letter-spacing:4px;
  transition:all 0.3s;
  border-radius:2px;
}
#title-screen .start-btn:hover{
  background:rgba(60,40,60,0.5);
  border-color:#8a6a7a;
  color:#ede4d0;
  letter-spacing:8px;
}
#title-screen .version-info{color:#3a2a3a;font-size:12px;margin-top:40px;letter-spacing:2px}
#end-screen{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:60vh;
  text-align:center;
}
#end-screen h2{font-size:28px;margin-bottom:12px;letter-spacing:4px}
#end-screen .end-desc{font-size:15px;color:#a09888;line-height:1.8;max-width:520px;margin-bottom:30px}
#end-screen .restart-btn{
  background:transparent;
  border:1px solid #4a3a4a;
  color:#b8a8a0;
  padding:12px 36px;
  font-family:'Noto Serif SC',serif;
  font-size:15px;
  cursor:pointer;
  letter-spacing:3px;
  transition:all 0.3s;
  border-radius:2px;
}
#end-screen .restart-btn:hover{
  background:rgba(60,40,60,0.5);
  border-color:#8a6a7a;
  color:#ede4d0;
}
#game-screen{display:none}
#chapter-divider{
  text-align:center;
  color:#4a3a4a;
  font-size:12px;
  letter-spacing:6px;
  margin:18px 0 10px 0;
  border-top:1px solid #1a1a2a;
  padding-top:14px;
}
#chapter-divider span{display:inline-block;padding:0 12px;background:rgba(16,12,22,0.9)}
.ability-info{color:#5a4a6a;font-size:12px;letter-spacing:1px;padding:4px 0;border:0}
@media(max-width:600px){
  #story{padding:20px 16px;font-size:15px}
  #title-screen h1{font-size:26px;letter-spacing:4px}
  #stats{flex-wrap:wrap;gap:6px;font-size:12px}
  #stats .stat{font-size:11px}
}
</style>
</head>
<body>

<div id="container">
  <div id="title-screen">
    <h1>永夜书馆</h1>
    <div class="sub">零号借阅者</div>
    <p style="color:#5a4a4a;font-size:13px;letter-spacing:2px;margin-bottom:30px;max-width:420px;line-height:1.6">
      「被书写即被存在。<br>被阅读即被完成。<br>被遗忘即被囚禁。」
    </p>
    <button class="start-btn" onclick="startGame()">开 始 阅 读</button>
    <p style="color:#3a2a3a;font-size:12px;margin-top:20px">十四页的命运 · 十三座书馆 · 七个结局</p>
    <p class="version-info">命运已经翻开了你的最后一页</p>
  </div>

  <div id="game-screen">
    <div id="stats">
      <div class="stat"><span class="label">✦ 姓名</span><span class="value" id="s-name">零号借阅者</span></div>
      <div class="stat"><span class="label">◆ 剩余页数</span><span class="value safe" id="s-pages">24</span></div>
      <div class="stat"><span class="label">◈ 章节</span><span class="value chapter" id="s-chapter">一</span></div>
      <div class="stat"><span class="label">◇ 当前位置</span><span class="value" id="s-location">第零馆</span></div>
    </div>

    <div id="story"></div>
    <div id="power-status"></div>

    <div id="ability-bar">
      <span class="ability-info">✦ 删改能力（通过场景选择触发，消耗 2 页）</span>
      <span class="ability-info">◎ 窥视能力（通过场景选择触发，消耗 1 页）</span>
    </div>

    <div id="chapter-divider"><span>—— 永夜书馆 · 叙事层 ——</span></div>

    <div id="choices"></div>
  </div>

  <div id="end-screen">
    <h2 id="end-title"></h2>
    <div class="end-desc" id="end-desc"></div>
    <button class="restart-btn" onclick="restartGame()">重 新 阅 读</button>
  </div>
</div>

<script>

// ===== 游戏状态 =====
const state = {
  name: '零号借阅者',
  pages: 14,
  maxPages: 14,
  location: '第零馆',
  flags: {},
  deleteUsed: false,
  peekUsed: false,
  history: [],
  scene: 'prologue',
  chapter: 1,
};
const chapterNames = ['零','一','二','三','四','五','六','七','八','九','十','十一','十二','十三','终'];

function getActivePowers() {
  const p = [];
  if (state.flags.hasFirePower) p.push('烈火书页');
  if (state.flags.hasErasePower) p.push('存在抹除');
  if (state.flags.hasHealPower) p.push('叙事治愈');
  if (state.flags.hasPoetPower) p.push('遗忘诗句');
  if (state.flags.hasForbiddenKnowledge) p.push('禁书真知');
  if (state.flags.hasAnchor) p.push('此刻之锚');
  return p;
}

// ===== 场景定义 =====
const scenes = {};

scenes.prologue = {
  render: () => {
    return `
      <p class="scene-title">— 序章：最后一位读者 —</p>
      <p>夜穹无星。墨海之上，十三座书馆的灯火如同悬浮的鬼火，在漆黑的云层中明灭。你站在第零馆的最高处，指尖还残留着书页烧尽的灰烬气息——三年前你在这里烧掉了《你的死亡》。从那以后，命运就像一本被撕毁索引的辞典，所有的词条都在混乱中跳转。</p>
      <p>封印的裂缝就在你面前十步之外，像一道无声裂开的眼睑。一本黑色封皮的书从中飘出，悬浮在半空——书页自动翻开，发出一阵类似骨骼摩擦的声响。每一页翻动时都有细微的字符飘散出来，像是被囚禁已久的萤火虫终于找到了出口。</p>
      <p class="highlight">「借阅者，你终于来了。这一次，轮到你被阅读了。」</p>
      <p>字迹在纸面上蠕动变化，每一个字都像是活的。与此同时，远方的第一馆、第三馆、第七馆依次爆发出低沉的警报声，声波穿透云海，震得脚下的石砖微微发颤。你感到自己的"剩余页数"在体内灼烧——那是你仅剩的寿命刻度，像一块烧红的烙铁贴在肋骨内侧。</p>
      <p>你低头看向自己的手——掌心有一道淡淡的疤痕，那是三年前烧书时被一页飞溅的火星灼伤留下的。疤痕在月光下微微发亮，像一行没有被完全烧毁的字迹。你试着回忆三年前的更多细节——但记忆在第零馆的裂缝之前就变得模糊了，像一本被水泡过的书，字迹晕染成一团，只能认出几个孤立的词语。</p>
      <p>裂缝中飘出的那本书翻到了某一页停了下来。你看到那页上画着一幅插画——一个人站在一座高台上，面前有三个方向。你认出那个人的轮廓是这座第零馆。你意识到那幅画描绘的就是此刻——你正站在插画中。你是在一本书的插画里做出了翻开它的决定。</p>
      <p class="note">你的能力「删改」可以修改现实的情节，但每使用一次，剩余页数就会减少。「窥视」则能让你看到隐藏的信息。使用需谨慎。</p>
      <p>远处，你隐约看到第二馆的灯火异常明亮，记录着正在发生的每一刻。第五馆的方向传来模糊的诗句吟诵声，像是某个人在反复吟唱同一段破碎的旋律。第八馆的大门紧闭，笼罩在一种令人不安的沉默中——那种沉默不是寂静，而是一种"被压制的声音"。</p>
      <p>风中带着一种奇特的混合气味：旧纸的霉味、火焰的残留焦味，以及某种你无法命名的东西——像是被时间本身腌渍过的空气。你深吸一口气——脚下的第零馆轻轻震动了一下，像是某个沉睡已久的生物翻了个身。</p>
    `;
  },
  choices: [
    { text: '伸手触碰那本悬浮的书', next: 'touch_book', hint: '命运主动找上了你' },
    { text: '转身赶往第一馆调查警报', next: 'go_first_hall', hint: '已知的历史正在被篡改' },
      { text: '使用「窥视」先看清这本书的本质', next: 'peek_book', hint: '消耗 1 页', ability: 'peek' },
    { text: '绕开裂缝，先去其他馆探查', next: 'cross_halls', hint: '拓宽视野再决定' },
    { text: '径直走向第三馆——那里安静得反常', next: 'hall_of_time', hint: '时间会告诉你答案' },
  ],
};

scenes.touch_book = {
  render: () => {
    return `
      <p class="scene-title">— 第零馆 · 书之触 —</p>
      <p>你的指尖触到书封的瞬间，一股冰冷的电流从指尖窜上脊椎——不是疼痛，而是一种被"读取"的感觉，仿佛有无数只眼睛从纸面内部注视着你。书页疯狂翻动，上面开始自动生成文字——每一行都是你刚才的心理活动，一字不差。你甚至看到了一句你还没来得及完全成型的念头——"这书是活的"——已经先你一步被写在了纸上。</p>
      <p class="highlight">「你在害怕。你害怕的不是死亡——你害怕的是自己从未真正活过。」</p>
      <p>书中的文字继续浮现：<em>「第零馆的封印只对一个目标裂开，那就是这本书真正的主人。而你……你并不是主人。你只是书签——夹在某一页里，标记着某个尚未到来的时刻。」</em></p>
      <p>你的指尖感觉到书页的质地——不是纸。是一种介于丝绸和皮肤之间的触感。每一页都微微温热像是有人刚刚用手捂过。你翻书的时候能听到极低的声音——不是机械摩擦更像是呼吸。</p>
      <p>一道黑影从裂缝中缓慢挤出。它没有固定的形态，像是由无数撕碎的书页拼凑而成的人形，每走一步，地上就留下燃烧的字符。空气中书页燃烧的气味混着臭氧——像暴风雨来临之前的空气。温度骤然下降到你呼出的气都变成了白雾。</p>
      <p>黑影开口了，声音像几百个人同时低语——你能在那些重叠的声音中辨认出不同的性别、年龄甚至语言：<strong>「把书还来。零号借阅者……你不该碰你看不懂的东西。那本书不属于你——它属于正在写它的那个人。」</strong></p>
      <p>黑影向前走了一步。燃烧的字符在它脚下组成了一行短暂的句子然后消散：<em>"第三次了。每次都是同一个开头。"</em> 你捕捉到那句话——第三次。这是你第三次翻开这本书了吗？还是它指的是更庞大的某种循环？</p>
    `;
  },
  choices: [
    { text: '使用「删改」抹除黑影的存在描述', next: 'delete_shadow', hint: '消耗 2 页', ability: 'delete' },
    { text: '问它是什么东西', next: 'ask_shadow', hint: '情报也许比武力更有用' },
    { text: '带着书跳下高台，利用墨海雾气逃离', next: 'escape_fall', hint: '高风险' },
    { text: '环顾四周寻找其他线索——裂缝里还有什么？', next: 'search_cracks', hint: '可能发现隐藏信息' },
  ],
};

scenes.search_cracks = {
  render: () => {
    return `
      <p class="scene-title">— 第零馆 · 裂缝深处 —</p>
      <p>你没有立刻触碰那本书——而是将目光投向裂缝深处。在封印的裂隙中除了缓缓飘出的那本书之外还有别的东西。你蹲下来——眯起眼睛——在裂缝内壁的阴影中你看到了一些被遗漏的东西：几页残破的纸片贴在裂缝内壁上，边缘已经泛黄卷曲，像是被匆忙塞进去的书签或者——更像是被人故意藏在那里的。</p>
      <p>你小心地伸出手臂探入裂缝——你的手指触到纸片时感到一阵微弱的电击感——然后你抽出了其中一张。纸的质感粗糙——不是永夜书馆通用的纸张——更像是一种手工纸。上面用一种你不认识的文字写着几行字。你看不懂这种文字——但奇怪的是，你竟然能理解它们的意思。像是你的大脑绕过了"阅读"这个步骤直接将意义灌入你的意识——因为写这些字的人使用了一种"叙事书写"而不是普通文字。</p>
      <p class="note">「第二馆的记录员在等你。她在所有版本的故事中都存活了下来。找到苏眠。——第一任零号借阅者留」</p>
      <p>你的心跳加快了。第一任零号借阅者——这个称谓意味着在你之前还有其他人走过这条路，而且他在三百年前就知道了你会来这里。他提到了第二馆和苏眠——这个名字你从没听过但她显然是某个关键人物。还有"所有版本的故事"——这意味着同一件事在多个版本中同时发生。</p>
      <p>你把纸片小心地折好放进衣袋。纸片贴着你的胸口——温热——像一只微小的手在轻按你的心脏。</p>
    `;
  },
  postRender: () => { state.flags.knownSuMian = true; },
  choices: [

      <p class="highlight">「我是第五馆的诗人。别人叫我'疯诗人'——因为我记得的东西太多而能说出来的太少。我的脑子里塞满了别人的记忆，快要装不下我自己的了。」</p>

// ===== 游戏引擎 =====

function advanceChapter() {
  if (state.chapter < 14) state.chapter++;
}

function startGame() {
  document.getElementById('title-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  state.pages = 14;
  state.maxPages = 14;
  state.flags = {};
  state.scene = 'prologue';
  state.deleteUsed = false;
  state.peekUsed = false;
  state.chapter = 1;
  state.location = '第零馆';
  state.history = [];
  renderScene('prologue');
  updateStats();
}

function updateStats() {
  document.getElementById('s-pages').textContent = state.pages;
  document.getElementById('s-pages').className = 'value' + (state.pages <= 2 ? ' danger' : state.pages <= 4 ? ' warning' : ' safe');
  document.getElementById('s-location').textContent = state.location;
  document.getElementById('s-chapter').textContent = chapterNames[state.chapter] || '终';

  const ps = document.getElementById('power-status');
  const active = getActivePowers();
  if (active.length > 0) {
    ps.innerHTML = active.map(p => `<span class="power-tag">✦ ${p}</span>`).join('');
  } else {
    ps.innerHTML = '<span style="color:#5a4a5a">尚未获得额外能力</span>';
  }
}

function renderScene(sceneId) {
  const scene = scenes[sceneId];
  if (!scene) return;

  state.scene = sceneId;
  state.history.push(sceneId);
  if (state.history.length > 10) state.history.shift();

  const story = document.getElementById('story');
  const choices = document.getElementById('choices');

  story.innerHTML = '';

  if (scene.preRender) scene.preRender();

  const content = scene.render();
  if (content) story.innerHTML = content;

  if (scene.postRender) scene.postRender();

  const chapterTriggers = {
    'go_first_hall': 2, 'explore_second': 2, 'go_second_hall': 2,
    'go_fifth_hall': 3, 'mad_poet_encounter': 3,
    'go_eighth_hall': 4, 'eighth_hall_vault': 4,
    'go_sixth_hall': 5, 'go_seventh_hall': 5,
    'go_ninth_hall': 6, 'ninth_inside': 6,
    'go_twelfth_hall': 10, 'go_core': 12,
    'thirteenth_basement': 13, 'thirteenth_inside': 13,
    'go_tenth_hall': 7, 'go_eleventh_hall': 8
  };
  if (chapterTriggers[sceneId] && state.chapter < chapterTriggers[sceneId]) {
    state.chapter = chapterTriggers[sceneId];
  }

  const endScenes = ['ending_the_end','ending_author','ending_tear','ending_release','ending_burn_secret','ending_rule_rewriter','ending_doppelganger'];
  const noGlitchScenes = ['prologue','touch_book','go_first_hall','peek_book','go_twelfth_hall','go_core'];
  if (Math.random() < 0.08 && !noGlitchScenes.includes(sceneId) && !endScenes.includes(sceneId) && state.pages > 3 && sceneId !== 'prologue') {
    const glitchPool = ['glitch_storm','glitch_echo','glitch_page_jump','glitch_duplicate'];
    const nextGlitch = glitchPool[Math.floor(Math.random() * glitchPool.length)];
    renderScene(nextGlitch);
    updateStats();
    return;
  }

  choices.innerHTML = '';

  if (scene.choices && scene.choices.length > 0) {
    scene.choices.forEach((choice) => {
      const btn = document.createElement('button');
      btn.className = 'choice-btn';
      const delCost = choice.abilityCost || 2;
      const disabled = (choice.ability === 'delete' && (state.pages < delCost || state.deleteUsed)) || (choice.ability === 'peek' && (state.pages < 1 || state.peekUsed));
      if (disabled) btn.classList.add('disabled');
      btn.innerHTML = choice.text + (choice.hint ? '<span class="hint">' + choice.hint + '</span>' : '');
      btn.onclick = () => {
        if (disabled) return;
        if (choice.ability === 'delete') { const c = choice.abilityCost || 2; if (state.pages >= c && !state.deleteUsed) { state.deleteUsed = true; } else { return; } }
        if (choice.ability === 'peek') { if (state.pages >= 1 && !state.peekUsed) { state.peekUsed = true; } else { return; } }
        renderScene(choice.next);
        updateStats();
      };
      choices.appendChild(btn);
    });
  }

  if (state.pages <= 0 && state.flags.hasAnchor) {
    state.flags.hasAnchor = false;
    state.pages = 1;
    state.location = '第零馆·锚定';
    story.innerHTML += '<p class="system">此刻之锚自动激活——你被拉回了安全的时点，剩余 1 页。锚已消耗。</p>';
  }

  if (state.pages <= 0 && !endScenes.includes(sceneId)) { showGameOver(); return; }

  updateStats();
  story.scrollTop = 0;
  document.getElementById('container').scrollIntoView({behavior:'smooth', block:'start'});
}

function showGameOver() {
  const ending = document.getElementById('end-screen');
  const game = document.getElementById('game-screen');
  game.style.display = 'none';
  ending.style.display = 'flex';
  document.getElementById('end-title').textContent = '结局：页码归零';
  document.getElementById('end-title').style.color = '#6a4a4a';
  document.getElementById('end-desc').innerHTML = `
    <p>你的剩余页数归零了。你感到自己像一本被读到最后一页的书封面缓缓合上。</p>
    <p>永夜书馆的灯火在你视野中逐渐模糊。你最后看到的是一行字——不知是写在书上还是写在空中：</p>
    <p style="color:#6a4a4a;margin:20px 0;font-size:18px;letter-spacing:3px">「故事结束了。读者闭上了眼睛。」</p>
    <p>零号借阅者你的借阅记录到此为止。</p>
  `;
}

function restartGame() {
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('title-screen').style.display = 'flex';
  state.pages = 14;
  state.maxPages = 14;
  state.flags = {};
  state.scene = 'prologue';
  state.deleteUsed = false;
  state.peekUsed = false;
  state.location = '第零馆';
  state.chapter = 1;
  state.history = [];
}
</script>
